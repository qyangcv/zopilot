name: Proof Windows ARM64 PyMuPDF

on:
  push:
    branches:
      - codex/proof-windows-arm64-pymupdf
  workflow_dispatch:

jobs:
  build-pymupdf-from-source:
    runs-on: windows-11-arm
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up ARM64 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: arm64

      - name: Show runner and Python details
        shell: pwsh
        run: |
          Write-Host "RUNNER_OS=$env:RUNNER_OS"
          Write-Host "RUNNER_ARCH=$env:RUNNER_ARCH"
          python -VV
          python -c "import platform, sysconfig; print(platform.platform()); print(platform.machine()); print(sysconfig.get_platform())"

      - name: Upgrade build frontend
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Build and install PyMuPDF from source
        run: python -m pip install --no-binary=pymupdf pymupdf==1.28.0 -v

      - name: Verify PyMuPDF import
        run: python -c "import pymupdf; print(pymupdf.__doc__[:200])"
