name: PDF Helper

on:
  workflow_dispatch:
  push:
    tags:
      - pdf-helper-v**

permissions:
  contents: write

env:
  ZOPILOT_PDF_HELPER_VERSION: 0.2.0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-15
            python: python3
          - platform: macos-x64
            runner: macos-15-intel
            python: python3
          - platform: windows-x64
            runner: windows-latest
            python: python
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Build helper
        run: ${{ matrix.python }} scripts/build-pdf-helper.py --platform ${{ matrix.platform }}
      - name: Upload helper artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-helper-${{ matrix.platform }}
          path: |
            dist/pdf-helper/zopilot-pdf-helper-${{ matrix.platform }}-v${{ env.ZOPILOT_PDF_HELPER_VERSION }}.zip
            dist/pdf-helper/pdf-helper-artifact-${{ matrix.platform }}.json

  publish:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v4
      - name: Download helper artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/pdf-helper/downloaded
      - name: Flatten artifacts
        run: |
          find dist/pdf-helper/downloaded -type f -name '*.zip' -exec cp {} dist/pdf-helper/ \;
          find dist/pdf-helper/downloaded -type f -name 'pdf-helper-artifact-*.json' -exec cp {} dist/pdf-helper/ \;
      - name: Build manifest
        run: python3 scripts/merge-pdf-helper-manifest.py
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            TAG="pdf-helper-v${ZOPILOT_PDF_HELPER_VERSION}"
          fi
          gh release create "$TAG" --title "$TAG" --notes "Zopilot PDF helper ${ZOPILOT_PDF_HELPER_VERSION}" || true
          gh release upload "$TAG" dist/pdf-helper/*.zip dist/pdf-helper/pdf-helper-manifest.json --clobber
